
# Colors
$text = rgb(ffffff)
$accent = rgb(e6c272)
$clockAccent = rgba(249, 226, 175, .7)
$background = rgb(312d23)
$backgroundAlt = rgb(50462f)

# Fonts
$font = Cantarell Regular
$clockFont = Cantarell Black

general {
    disable_loading_bar = true 
    hide_cursor = false
}

background {
    monitor =
    path = ~/wallpapers/nijika-ijichi-btr.jpg
    blur_passes = 2
    # color = $COLOR / rgb(COLOR)
}

# Time
label {
    monitor =
    text = cmd[update:30000] echo -e "$(date +"%R")" # 24-hour style
    # text = cmd[update:30000] echo -e "$(date +"%r")"
    color = $clockAccent
    font_size = 120
    font_family = $clockFont
    position = 0, -60
    halign = center
    valign = top
}

# Date
label {
    monitor = 
    text = cmd[update:43200000] echo -e "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 20
    font_family = $font
    position = 0, -250
    halign = center
    valign = top
}

# Logged user
label {
    monitor = 
    font_size = 6
    font_family = Noto Sans Mono
    text = Currently logged in as $USER
    halign = center
    valign = bottom
    position = 0, 5
}

# Avatar
image {
    monitor = 
    path = ~/.face
    size = 70
    border_color = $accent
    position = 0, 100
    halign = center
    valign = bottom
}

# Input (password)
input-field {
    monitor =
    size = 180, 35
    outline_thickness = 1 
    dots_size = .15
    dots_spacing = .6
    dots_center = true
    outer_color = $backgroundAlt
    inner_color = $background
    font_color = $text
    fade_on_empty = false
    placeholder_text = 
    hide_input = false
    check_color = $accent
    fail_color = $accent
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $accent
    position = 0, 40
    halign = center
    valign = bottom
}
